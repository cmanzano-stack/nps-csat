/* ════ CSV PARSER ════ */
function parseCSV(txt){
  const rows=[];
  const lines=txt.trim().split("\n");
  if(!lines.length) return rows;
  const parseRow=line=>{
    const vals=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"' && !inQ){inQ=true;}
      else if(line[i]==='"' && inQ){
        if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;
      } else if(line[i]===',' && !inQ){vals.push(cur.trim());cur='';}
      else cur+=line[i];
    }
    vals.push(cur.trim());
    return vals;
  };
  const headers=parseRow(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z0-9_]/g,'_'));
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const vals=parseRow(lines[i]);
    const obj={};
    headers.forEach((h,idx)=>{ obj[h]=vals[idx]||''});
    rows.push(obj);
  }
  return rows;
}

async function fetchCSV(url){
  try{
    const r=await fetch(url);
    if(!r.ok) throw new Error('HTTP '+r.status);
    return parseCSV(await r.text());
  }catch(err){console.error('fetchCSV error',url,err);return [];}
}

/* ════ CHARTS ════ */
function ChartDonut({id,p,n,d,score,label}){
  const ref=useRef(null),chart=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(chart.current) chart.current.destroy();
    const ctx=ref.current.getContext('2d');
    chart.current=new Chart(ctx,{
      type:'doughnut',
      data:{labels:['Promotores','Neutros','Detractores'],datasets:[{data:[p||0,n||0,d||0],backgroundColor:[SUCCESS,WARN,DANGER],borderWidth:4,borderColor:'#fff',hoverOffset:8}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'74%',plugins:{legend:{display:false}}},
      plugins:[{id:'center_'+id,beforeDraw:(ch)=>{
        const {ctx:c,width:w,height:h}=ch;c.save();
        const fs=Math.min(w,h)/5;
        c.font=`800 ${fs}px DM Sans,sans-serif`;c.textAlign='center';c.textBaseline='middle';c.fillStyle='#111827';
        c.fillText((score>0?'+':'')+(score||0),w/2,h/2-3);
        c.font=`500 ${fs/2.6}px DM Sans,sans-serif`;c.fillStyle='#9AA0B4';
        c.fillText(label,w/2,h/2+fs/1.5);c.restore();
      }}]
    });
    return()=>{if(chart.current)chart.current.destroy()};
  },[p,n,d,score,label,id]);
  return e('div',{style:{position:'relative',width:'100%',height:190}},
    e('canvas',{ref,role:'img','aria-label':`${label}: ${score}`}));
}

function ChartLinea({id,datos,color,minY,maxY,isPercent}){
  const ref=useRef(null),chart=useRef(null);
  useEffect(()=>{
    if(!ref.current||!datos||!datos.length) return;
    if(chart.current) chart.current.destroy();
    const ctx=ref.current.getContext('2d');
    chart.current=new Chart(ctx,{
      type:'line',
      data:{labels:datos.map(d=>d.q),datasets:[{data:datos.map(d=>d.score),borderColor:color||BRAND,backgroundColor:(color||BRAND)+'14',borderWidth:4,tension:.35,fill:true,pointBackgroundColor:color||BRAND,pointRadius:5,pointHoverRadius:8}]},
      options:{responsive:true,maintainAspectRatio:false,
        scales:{
          y:{min:minY!==undefined?minY:-100,max:maxY!==undefined?maxY:100,grid:{color:'#F3F4F6'},ticks:{font:{family:'DM Sans',size:11},callback:isPercent?v=>v+'%':undefined}},
          x:{grid:{display:false},ticks:{font:{family:'DM Sans',weight:'600',size:11}}}
        },
        plugins:{legend:{display:false}}
      }
    });
    return()=>{if(chart.current)chart.current.destroy()};
  },[datos,color,id,minY,maxY,isPercent]);
  return e('div',{style:{width:'100%',height:220}},e('canvas',{ref}));
}

    ),
    loading&&e('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'12px 0',color:'rgba(255,255,255,.6)',fontSize:13}},

/* ════ MÓDULO NPS ════ */
function ModNPS({data,onExportPDF}){
  const {hoja1=[],historico=[]}=data;
  const [p1P,setP1P]=useState('Todos',[p1P]);
  const [p1M,setP1M]=useState('Todos',[p1M]);
  const [p2P,setP2P]=useState('Todos',[p2P]);
  const [p2M,setP2M]=useState('Todos',[p2M]);
  const [hP,setHP]=useState('Todos',[hP]);
  const [hA,setHA]=useState('Todos',[hA]);

  // Detectar campos reales del sheet NPS Histórico
  // Columnas: Email, Nombre, Apellido, Nombre Empresa, Fecha, KAM, nombre KAM, Respuesta 1
  const paises=useMemo(()=>{
    const s=new Set();
    hoja1.forEach(r=>{if(r.pa__s||r.pais)s.add(r.pa__s||r.pais);});
    historico.forEach(r=>{if(r.pa__s||r.pais)s.add(r.pa__s||r.pais);});
    return ['Todos',...Array.from(s).sort()];
  },[hoja1,historico]);

  // Meses desde fechas reales
  const meses=useMemo(()=>{
    const s=new Set();
    const parseMes=fecha=>{
      if(!fecha) return null;
      try{const d=new Date(fecha);if(isNaN(d)) return null;return d.toLocaleString('es',{month:'long',year:'numeric'});}catch{return null;}
    };
    hoja1.forEach(r=>{const m=parseMes(r.fecha);if(m)s.add(m);});
    historico.forEach(r=>{const m=parseMes(r.fecha);if(m)s.add(m);});
    return ['Todos',...Array.from(s).sort()];
  },[hoja1,historico]);

  const anios=useMemo(()=>{
    const s=new Set();
    historico.forEach(r=>{
      if(r.fecha){try{const d=new Date(r.fecha);if(!isNaN(d))s.add(String(d.getFullYear()));}catch{}}
    });
    return s.size>0?Array.from(s).sort():['2026'];
  },[historico]);

  // Filtrar hoja1 (P1: satisfaccion column, comentarios)
  const f1=useMemo(()=>hoja1.filter(r=>{
    const pok=p1P==='Todos'||(r.pa__s||r.pais)===p1P;
    const mok=p1M==='Todos'||!r.fecha||new Date(r.fecha).toLocaleString('es',{month:'long',year:'numeric'})===p1M;
    return pok&&mok&&(r.satisfaccion||r.nota||r.puntuacion||'').trim()!=='';
  }),[hoja1,p1P,p1M]);

  // Filtrar histórico (P2: respuesta 1)
  const f2=useMemo(()=>historico.filter(r=>{
    const pok=p2P==='Todos'||(r.pa__s||r.pais)===p2P;
    const mok=p2M==='Todos'||!r.fecha||new Date(r.fecha).toLocaleString('es',{month:'long',year:'numeric'})===p2M;
    return pok&&mok&&r.respuesta_1!==undefined&&r.respuesta_1!=='';
  }),[historico,p2P,p2M]);

  const calcNPS=(arr,campo)=>{
    const total=arr.length;if(!total) return{total:0,p:0,n:0,d:0,score:0,avg:'—',pPorc:0};
    let pr=0,ne=0,de=0,s=0;
    arr.forEach(r=>{
      const v=parseFloat(r[campo]||0);
      if(!isNaN(v)&&v>0){s+=v;if(v>=9)pr++;else if(v>=7)ne++;else de++;}
    });
    const tot2=pr+ne+de||1;
    return{total,p:pr,n:ne,d:de,score:Math.round(((pr/tot2)*100)-((de/tot2)*100)),avg:(s/(pr+ne+de||1)).toFixed(1),pPorc:((pr/(pr+ne+de||1))*100).toFixed(0)};
  };

  const m1=useMemo(()=>calcNPS(f1,'satisfaccion'),[f1]);
  const m2=useMemo(()=>calcNPS(f2,'respuesta_1'),[f2]);

  // Tendencia histórica por KAM / mes
  const linea=useMemo(()=>{
    const fh=historico.filter(r=>{
      const pok=hP==='Todos'||(r.pa__s||r.pais)===hP;
      const aok=hA==='Todos'||!r.fecha||String(new Date(r.fecha).getFullYear())===hA;
      return pok&&aok&&r.respuesta_1!==undefined&&r.respuesta_1!=='';
    });
    const qs={};
    fh.forEach(r=>{
      if(!r.fecha) return;
      try{
        const d=new Date(r.fecha);
        if(isNaN(d)) return;
        const k=d.toLocaleString('es',{month:'short',year:'2-digit'});
        if(!qs[k]) qs[k]={pr:0,de:0,tot:0,fecha:d};
        const v=parseFloat(r.respuesta_1||0);
        if(!isNaN(v)&&v>0){qs[k].tot++;if(v>=9)qs[k].pr++;else if(v<7)qs[k].de++;}
      }catch{}
    });
    return Object.entries(qs).sort((a,b)=>a[1].fecha-b[1].fecha)
      .map(([q,d])=>({q,score:d.tot?Math.round(((d.pr/d.tot)*100)-((d.de/d.tot)*100)):0}));
  },[historico,hP,hA]);

  const criticos=useMemo(()=>historico.filter(r=>{
    const v=parseFloat(r.respuesta_1||0);return!isNaN(v)&&v>0&&v<=6;
  }).sort((a,b)=>parseFloat(a.respuesta_1||10)-parseFloat(b.respuesta_1||10)),[historico]);

  // Normalizar para panel IA
  const rawParaIA=useMemo(()=>[
    ...f1.map(r=>({puntuacion:r.satisfaccion,razon:r.comentarios,empresa:r.empresa,pais:r.pa__s||r.pais})),
    ...f2.map(r=>({puntuacion:r.respuesta_1,razon:r.nombre_empresa||r.nombre,empresa:r.nombre_empresa||r.nombre,pais:r.pa__s||r.pais}))
  ],[f1,f2]);

  return e('div',{style:{display:'flex',flexDirection:'column',gap:24}},
    e(PanelIA,{
      titulo:'Apprecio Beat IA · Análisis NPS',
      descripcion:'Analiza casos frecuentes, segmentación y riesgo de churn con datos reales',
      buildPrompt:buildPromptNPS,
      data:{raw:rawParaIA}
    }),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}},
      e(BloqueEspejo,{
        id:'nps1',
        titulo:'Satisfacción del cliente · Apprecio App (Hoja 1)',
        ...m1,paises,meses,filtroPais:p1P,setFP:setP1P,filtroMes:p1M,setFM:setP1M,
        labelScore:'Satisfacción',filtrados:f1,onExportPDF:exportarPDFconIA
      }),
      e(BloqueEspejo,{
        id:'nps2',
        titulo:'NPS · Respuesta 1 del Histórico de Encuestas',
        ...m2,paises,meses,filtroPais:p2P,setFP:setP2P,filtroMes:p2M,setFM:setP2M,
        labelScore:'NPS Score',filtrados:f2,onExportPDF:exportarPDFconIA
      })
    ),
    e('div',{className:'card',style:{padding:24,display:'flex',gap:24,flexWrap:'wrap'}},
      e('div',{style:{flex:'0 0 60%',minWidth:280}},
        e('h3',{style:{fontSize:13,fontWeight:700,color:'#1F2937',marginBottom:16}},'📈 Evolución NPS por Mes (datos reales)'),
        linea.length===0
          ?e('div',{style:{height:220,display:'flex',alignItems:'center',justifyContent:'center',color:'#D1D5DB',fontSize:12}},'Sin datos históricos')
          :e(ChartLinea,{id:'nps_linea',datos:linea,color:BRAND,minY:-100,maxY:100})
      ),
      e('div',{style:{flex:1,display:'flex',flexDirection:'column',gap:14,minWidth:180}},
        e('p',{style:{fontSize:11,fontWeight:700,color:'#9AA0B4',textTransform:'uppercase',letterSpacing:.5}},'Filtros de tendencia'),
        e('div',{},
          e('label',{style:{fontSize:11,color:'#9AA0B4',fontWeight:600,display:'block',marginBottom:4}},'País'),
          e('select',{value:hP,onChange:ev=>setHP(ev.target.value),style:{width:'100%',fontSize:12,fontWeight:600,background:'#F9FAFB',border:'1px solid #E5E7EB',borderRadius:8,padding:'7px 10px'}},
            paises.map(p=>e('option',{key:p,value:p},p)))
        ),
        e('div',{},
          e('label',{style:{fontSize:11,color:'#9AA0B4',fontWeight:600,display:'block',marginBottom:4}},'Año'),
          e('select',{value:hA,onChange:ev=>setHA(ev.target.value),style:{width:'100%',fontSize:12,fontWeight:600,background:'#F9FAFB',border:'1px solid #E5E7EB',borderRadius:8,padding:'7px 10px'}},
            ['Todos',...anios].map(a=>e('option',{key:a,value:a},a)))
        )
      )
    ),
    e('div',{className:'card',style:{padding:24}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
        e('h3',{style:{fontSize:13,fontWeight:700,color:DANGER,display:'flex',alignItems:'center',gap:8}},
          e('i',{className:'fa-solid fa-triangle-exclamation'}),' Radar de Alertas · Detractores NPS (datos reales)'),
        e('span',{className:'badge',style:{background:'#FEF2F2',color:DANGER}},`${criticos.length} casos`)
      ),
      criticos.length===0
        ?e('p',{style:{color:SUCCESS,fontWeight:600,fontSize:13,textAlign:'center',padding:'12px 0'}},'✅ Sin detractores en el período')
        :e('div',{style:{display:'flex',flexDirection:'column',gap:8}},
          criticos.slice(0,10).map((c,i)=>
            e('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 16px',borderRadius:10,border:'1px solid #FEE2E2',background:'#FFFBFB',gap:12}},
              e('div',{},
                e('p',{style:{fontWeight:700,fontSize:12,color:'#1F2937',margin:0}},
                  (c.nombre||'')+' '+(c.apellido||'')+' - '+(c.nombre_empresa||c.nombre_kam||'—'),
                  e('span',{style:{fontWeight:400,color:'#9AA0B4'}},' · '+(c.pais||c.pa__s||'—')+' · '+
                    (c.fecha?new Date(c.fecha).toLocaleDateString('es'):'—'))
                ),
                e('p',{style:{fontSize:11,color:'#9AA0B4',margin:'2px 0 0',fontStyle:'italic'}},
                  'KAM: '+(c.nombre_kam||c.kam||'—'))
              ),
              e('span',{className:'badge',style:{background:DANGER,color:'white',flexShrink:0}},'Nota: '+(c.respuesta_1||'—'))
            )
          )
        )
    )
  );
}

/* ════ MÓDULO CSAT ════ */
function ModCSAT({data,onExportPDF}){
  const {csatRespuestas=[],csatConsulta=[]}=data;
  const [c1P,setC1P]=useState('Todos',[c1P]);
  const [c1M,setC1M]=useState('Todos',[c1M]);

  // Columnas reales sheet respuestas_encuestas:
  // Fecha_Envio, Mes_envio, empresa_id, País, Nombre de la empresa, correo_enviado, Link_utilizado,
  // Trimestre_Año, ¿Qué tan satisfecho(a)...? (col 8), ¿Qué fue lo más fácil? (col 9), Estado

  const paises=useMemo(()=>{
    const s=new Set();
    csatRespuestas.forEach(r=>{if(r.pa__s||r.pais||r.pa_s)s.add(r.pa__s||r.pais||r.pa_s);});
    return ['Todos',...Array.from(s).sort()];
  },[csatRespuestas]);

  const meses=useMemo(()=>{
    const s=new Set();
    csatRespuestas.forEach(r=>{if(r.mes_envio)s.add(r.mes_envio);});
    return ['Todos',...Array.from(s).sort()];
  },[csatRespuestas]);

  const getCampoNota=r=>{
    // Buscar la columna de puntuación (cualquier variante)
    const keys=Object.keys(r);
    const k=keys.find(k=>k.includes('satisfecho')||k.includes('satisfech')||k.includes('escala')||k==='nota'||k==='puntuacion'||k==='satisfaccion');
    return k?r[k]:'';
  };

  const getCampoComentario=r=>{
    const keys=Object.keys(r);
    const k=keys.find(k=>k.includes('f___cil')||k.includes('facil')||k.includes('mejorar')||k.includes('comentar')||k.includes('proceso'));
    return k?r[k]:'';
  };

  const f1=useMemo(()=>csatRespuestas.filter(r=>{
    const pok=c1P==='Todos'||(r.pa__s||r.pais||r.pa_s)===c1P;
    const mok=c1M==='Todos'||r.mes_envio===c1M;
    const nota=getCampoNota(r);
    return pok&&mok&&nota!=='';
  }),[csatRespuestas,c1P,c1M]);

  const calcCSAT=(arr)=>{
    const total=arr.length;if(!total) return{total:0,p:0,n:0,d:0,score:0,avg:'—',pPorc:0};
    let a=0,m=0,b=0,s=0;
    arr.forEach(r=>{
      const v=parseFloat(getCampoNota(r)||0);
      if(!isNaN(v)&&v>0){s+=v;if(v>=9)a++;else if(v>=7)m++;else b++;}
    });
    const tot2=a+m+b||1;
    return{total,p:a,n:m,d:b,score:Math.round((a/tot2)*100),avg:(s/(tot2)).toFixed(1),pPorc:((a/tot2)*100).toFixed(0)};
  };

  const m1=useMemo(()=>calcCSAT(f1),[f1]);

  // Tendencia CSAT por mes
  const hA=useMemo(()=>{
    const qs={};
    f1.forEach(r=>{
      const k=r.mes_envio||r.trimestre___a__o||'Sin mes';
      if(!qs[k])qs[k]=[];
      qs[k].push(r);
    });
    return Object.keys(qs).map(k=>{
      let s=0,c=0;
      qs[k].forEach(r=>{const v=parseFloat(getCampoNota(r)||0);if(!isNaN(v)&&v>0){s+=v;c++;}});
      return{q:k,score:c>0?parseFloat((s/c).toFixed(1)):0};
    });
  },[f1]);

  const criticos=useMemo(()=>f1.filter(r=>{
    const v=parseFloat(getCampoNota(r)||0);return!isNaN(v)&&v>0&&v<=6;
  }),[f1]);

  // Normalizar para IA
  const rawParaIA=useMemo(()=>f1.map(r=>({
    puntuacion:getCampoNota(r),
    comentario:getCampoComentario(r),
    empresa:r.nombre_de_la_empresa||r.empresa||'—',
    pais:r.pa__s||r.pais||r.pa_s||'—'
  })),[f1]);

  // Estado de links de consulta_abono
  const statsConsulta=useMemo(()=>{
    const estados={};
    csatConsulta.forEach(r=>{
      const est=r.estado_de_link||r.estado||'';
      if(est)estados[est]=(estados[est]||0)+1;
    });
    return estados;
  },[csatConsulta]);

  return e('div',{style:{display:'flex',flexDirection:'column',gap:20}},
    e(PanelIA,{
      titulo:'Apprecio Beat IA · CSAT Post Abono',
      descripcion:'Análisis de satisfacción con datos reales de encuestas post-abono',
      buildPrompt:(d,t)=>buildPromptCSAT({abonoRaw:rawParaIA,reunionRaw:[]},t),
      data:{abonoRaw:rawParaIA,reunionRaw:[]}
    }),
    e('div',{style:{background:'#FFF5F7',border:'1px solid #FBC9D4',borderRadius:12,padding:'11px 16px'}},
      e('p',{style:{fontSize:11,fontWeight:700,color:BRAND,textTransform:'uppercase',letterSpacing:.5,margin:0}},'CSAT Post Abono · Encuestas reales'),
      e('p',{style:{fontSize:11,color:'#9AA0B4',margin:'2px 0 0'}},`${csatRespuestas.length} respuestas totales · Estado de envíos: `+Object.entries(statsConsulta).map(([k,v])=>`${k}: ${v}`).join(' | '))
    ),
    e(BloqueEspejo,{
      id:'csat1',
      titulo:'¿Qué tan satisfecho(a) estás con el uso de la plataforma? (Escala 1-10)',
      ...m1,paises,meses,filtroPais:c1P,setFP:setC1P,filtroMes:c1M,setFM:setC1M,
      labelScore:'Satisfacción',filtrados:f1,onExportPDF:exportarPDFconIA
    }),
    e('div',{className:'card',style:{padding:24}},
      e('h3',{style:{fontSize:13,fontWeight:700,color:'#1F2937',marginBottom:16}},'📊 Tendencia CSAT por Mes (datos reales)'),
      hA.length===0
        ?e('div',{style:{height:220,display:'flex',alignItems:'center',justifyContent:'center',color:'#D1D5DB',fontSize:12}},'Sin datos')
        :e(ChartLinea,{id:'csat_linea',datos:hA,color:INFO,minY:1,maxY:10})
    ),
    criticos.length>0&&e('div',{className:'card',style:{padding:24}},
      e('h3',{style:{fontSize:13,fontWeight:700,color:DANGER,marginBottom:12}},'⚠️ Respuestas Críticas CSAT (nota ≤ 6)'),
      e('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        criticos.slice(0,10).map((c,i)=>e('div',{key:i,style:{display:'flex',justifyContent:'space-between',padding:'10px 14px',borderRadius:10,border:'1px solid #FEE2E2',background:'#FFFBFB',gap:12}},
          e('div',{style:{flex:1}},
            e('p',{style:{fontWeight:700,fontSize:12,margin:0}},c.nombre_de_la_empresa||c.empresa||'Empresa',
              e('span',{style:{fontWeight:400,color:'#9AA0B4'}},' · '+(c.pa__s||c.pais||c.pa_s||'—')+' · '+(c.mes_envio||'—'))
            ),
            e('p',{style:{fontSize:11,color:'#9AA0B4',margin:'2px 0 0',fontStyle:'italic'}},getCampoComentario(c)||'Sin comentario')
          ),
          e('span',{className:'badge',style:{background:DANGER,color:'white',flexShrink:0}},getCampoNota(c))
        ))
      )
    )
  );
}

/* ════ TAB PLACEHOLDER ════ */
function TabPlaceholder({icono,titulo}){
  return e('div',{className:'card',style:{padding:60,textAlign:'center'}},
    e('i',{className:`fa-solid ${icono}`,style:{fontSize:38,color:BRAND,display:'block',marginBottom:16}}),
    e('h2',{style:{fontSize:16,fontWeight:700,color:'#1F2937',marginBottom:8}},titulo),
    e('p',{style:{color:'#9AA0B4',fontSize:13}},'Módulo en desarrollo')
  );
}

/* ════ APP ════ */
function App(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [tab,setTab]=useState(0);

  const load=useCallback(async()=>{
    setLoading(true);setError(null);
    try{
      const [hoja1,historico,csatRespuestas,csatConsulta]=await Promise.all([
        fetchCSV(CONFIG.SHEETS.NPS_HOJA1),
        fetchCSV(CONFIG.SHEETS.NPS_HISTORICO),
        fetchCSV(CONFIG.SHEETS.CSAT_RESPUESTAS),
        fetchCSV(CONFIG.SHEETS.CSAT_CONSULTA)
      ]);
      setData({hoja1,historico,csatRespuestas,csatConsulta});
    }catch(err){setError(err.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{load();},[]);

  const tabs=[
    {label:'NPS',icon:'fa-chart-line'},
    {label:'CSAT Post Abono',icon:'fa-star'},
    {label:'Inactivos',icon:'fa-user-clock'},
    {label:'Offboarding',icon:'fa-right-from-bracket'}
  ];

  return e('div',{style:{minHeight:'100vh',background:'#F2F4F7',fontFamily:''DM Sans', sans-serif'}},
    e('style',null,'@keyframes spin{to{transform:rotate(360deg)}}'),
    e('header',{style:{background:'#fff',borderBottom:'1px solid #E8EAED',position:'sticky',top:0,zIndex:30,padding:'0 32px'}},
      e('div',{style:{maxWidth:1280,margin:'0 auto'}},
        e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',height:66}},
          e('div',{style:{display:'flex',alignItems:'center',gap:12}},
            e(Logo,{size:36}),
            e('div',{},
              e('h1',{style:{fontSize:15,fontWeight:800,color:'#1F2937',margin:0,letterSpacing:'-.3px'}},'Experiencia del Cliente'),
              e('p',{style:{fontSize:11,color:'#9AA0B4',margin:0,fontWeight:500}},'Dashboard CX · Apprecio Beat 2026')
            )
          ),
          e('div',{style:{display:'flex',alignItems:'center',gap:10}},
            !loading&&data&&e('div',{style:{display:'flex',alignItems:'center',gap:6,background:'#F0FDF4',borderRadius:8,padding:'5px 12px',border:'1px solid #BBF7D0'}},
              e('div',{style:{width:6,height:6,borderRadius:'50%',background:'#10B981'}}),
              e('span',{style:{fontSize:11,fontWeight:700,color:'#065F46'}},
                `Datos reales · ${(data.historico||[]).length} enc. NPS · ${(data.csatRespuestas||[]).length} enc. CSAT`)
            ),
            loading&&e('div',{style:{display:'flex',alignItems:'center',gap:6,background:'#F0F9FF',borderRadius:8,padding:'5px 12px',border:'1px solid #BAE6FD'}},
              e('div',{style:{width:6,height:6,borderRadius:'50%',background:'#0EA5E9'}}),
              e('span',{style:{fontSize:11,fontWeight:700,color:'#0C4A6E'}},'Cargando datos...')
            ),
            e('button',{className:'btn-ghost',onClick:load,disabled:loading,style:{width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',padding:0}},
              e('i',{className:`fa-solid fa-rotate-right${loading?' fa-spin':''}`,style:{fontSize:13,color:'#6B7280'}}))
          )
        ),
        e('div',{style:{display:'flex',gap:28,marginBottom:-1}},
          tabs.map(({label,icon},i)=>
            e('button',{key:i,onClick:()=>setTab(i),className:`tab-btn${tab===i?' active':''}`,
              style:{fontSize:12,fontWeight:tab===i?700:600,color:tab===i?BRAND:'#9AA0B4',display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}},
              e('i',{className:`fa-solid ${icon}`,style:{fontSize:11}}),' ',label))
        )
      )
    ),
    e('main',{style:{maxWidth:1280,margin:'0 auto',padding:'28px 32px'}},
      loading&&e('div',{style:{display:'flex',flexDirection:'column',gap:20}},
        e('div',{className:'skeleton',style:{height:90}}),
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}},
          e('div',{className:'skeleton',style:{height:300}}),
          e('div',{className:'skeleton',style:{height:300}})
        ),
        e('div',{className:'skeleton',style:{height:260}}),
        e('div',{className:'skeleton',style:{height:180}})
      ),
      !loading&&error&&e('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 0',gap:16}},
        e('div',{style:{width:60,height:60,borderRadius:16,background:'#FEF2F2',display:'flex',alignItems:'center',justifyContent:'center'}},
          e('i',{className:'fa-solid fa-triangle-exclamation',style:{fontSize:26,color:DANGER}})
        ),
        e('p',{style:{fontWeight:700,fontSize:15,color:'#1F2937'}},'Error cargando datos: '+error),
        e('p',{style:{fontSize:12,color:'#9AA0B4',textAlign:'center',maxWidth:400}},'Verifica que los Google Sheets sean públicos (Cualquiera con el enlace puede ver).'),
        e('button',{className:'btn-primary',onClick:load,style:{padding:'10px 26px',fontSize:13}},'Reintentar')
      ),
      !loading&&!error&&data&&e('div',{},
        tab===0&&e(ModNPS,{data,onExportPDF:exportarPDFconIA}),
        tab===1&&e(ModCSAT,{data,onExportPDF:exportarPDFconIA}),
        tab===2&&e(TabPlaceholder,{icono:'fa-user-clock',titulo:'Análisis de Clientes Inactivos'}),
        tab===3&&e(TabPlaceholder,{icono:'fa-right-from-bracket',titulo:'Registro de Procesos de Offboarding'})
      )
    ),
    e('footer',{style:{textAlign:'center',padding:'22px 0',fontSize:11,color:'#D1D5DB',borderTop:'1px solid #E8EAED',background:'#fff',marginTop:40}},
      'Apprecio · Dashboard Experiencia del Cliente · 2026 · Powered by Claude AI')
  );
}

ReactDOM.render(e(App),document.getElementById('root'));
</script>
</body>
</html>
